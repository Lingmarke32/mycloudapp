name: Docke CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t mycloudapp .

      - name: Run Container Test
        run: |
          docker run -d -p 8080:80 mycloudapp
          sleep 10

      - name: check running container
        run: docker ps

      - name: Test App
        run: curl http://localhost:8080
